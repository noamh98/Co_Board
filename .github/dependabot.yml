# Dependabot — התראות ועדכוני תלויות שבועיים (ממצא D-3 ב-docs/reviews/ULTRA-REVIEW.md).
version: 2
updates:
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types: ['minor', 'patch']
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
