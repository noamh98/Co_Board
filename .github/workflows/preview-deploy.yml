name: Preview Deploy

# פריסת גרסת-טסט ידנית ל-Firebase Hosting preview channel (URL זמני, לא נוגע ב-production).
# מופעל מ-Actions → Preview Deploy → Run workflow.
#
# Secrets נדרשים (GitHub → Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT  — JSON key (Project Settings → Service accounts)
#   VITE_FIREBASE_*           — שישה ערכי config לקוח (כמו ב-deploy.yml)
#
# ⚠️ Hosting preview = URL זמני ובטוח. Functions אין preview channel:
#    אם deploy_functions=true הם נפרסים לפרויקט החי (השינויים תואמי-לאחור).

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'שם ה-preview channel (URL זמני)'
        required: true
        default: 'review-quick-wins'
        type: string
      expires:
        description: 'תפוגה (למשל 7d, 30d)'
        required: true
        default: '7d'
        type: string
      deploy_functions:
        description: 'לפרוס גם Cloud Functions? (נוגע בפרויקט החי — אין preview ל-functions)'
        required: true
        default: false
        type: boolean

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── בדיקת-סודות מקדימה: כשל ברור אם חסר, במקום שגיאת-פריסה מעורפלת ──
      - name: Verify required secrets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          missing=0
          for name in FIREBASE_SERVICE_ACCOUNT VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN \
                      VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET \
                      VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::חסר GitHub secret: $name"
              missing=1
            else
              echo "✓ $name מוגדר"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::הוסף את הסודות החסרים ב-Settings → Secrets and variables → Actions ונסה שוב."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # ── App: gate (lint + test + build) ──
      - name: Install (app)
        working-directory: app
        run: npm ci
      - name: Lint (app)
        working-directory: app
        run: npm run lint
      - name: Test (app)
        working-directory: app
        run: npm test
      - name: Build (app)
        working-directory: app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Write service account
        run: printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"

      # ── Functions: build + (אופציונלי) deploy לפרויקט החי ──
      - name: Install (functions)
        if: ${{ inputs.deploy_functions }}
        working-directory: functions
        run: npm ci
      - name: Build (functions)
        if: ${{ inputs.deploy_functions }}
        working-directory: functions
        run: npm run build
      - name: Deploy functions (live project)
        if: ${{ inputs.deploy_functions }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: >-
          npx --yes firebase-tools@13 deploy
          --only functions
          --project co-board
          --non-interactive

      # ── Hosting: preview channel (URL זמני) ──
      - name: Deploy hosting preview channel
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: >-
          npx --yes firebase-tools@13 hosting:channel:deploy '${{ inputs.channel }}'
          --project co-board
          --expires '${{ inputs.expires }}'
          --non-interactive
