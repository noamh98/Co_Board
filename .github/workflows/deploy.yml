name: Deploy

# Auto-deploy to Firebase on push to main.
# Gate: lint + test + build must pass; any failure stops the job before deploy.
# Phase 0 (H-CD): deploy now also pushes firestore:rules, storage:rules and functions —
#   ends rules/functions drift (rules were previously deployed by hand = security risk).
# Required GitHub secrets:
#   FIREBASE_SERVICE_ACCOUNT  — JSON key (Firebase Console → Project Settings → Service accounts)
#   VITE_FIREBASE_*           — six client credentials mirrored from app/.env.local
# NOTE: function secrets (GOOGLE_TTS_API_KEY, GEMINI_API_KEY — used by ttsProxy/aiBoard,
#   see functions/src/*.ts defineSecret calls) are NOT GitHub secrets and are NOT set here —
#   they live in Firebase/GCP Secret Manager, set once per-project with
#   `firebase functions:secrets:set <NAME>`. If either is missing/renamed there, the
#   *deploy* still succeeds — only the corresponding Cloud Function call fails at runtime.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # ── App: gate (lint + test + build) ────────────────────────────
      - name: Install (app)
        working-directory: app
        run: npm ci
      - name: Lint (app)
        working-directory: app
        run: npm run lint
      - name: Test (app)
        working-directory: app
        run: npm test
      - name: Build (app)
        working-directory: app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── Functions: install + build (so deploy ships compiled lib/) ──
      - name: Install (functions)
        working-directory: functions
        run: npm ci
      - name: Build (functions)
        working-directory: functions
        run: npm run build

      # ── Deploy: hosting + rules + storage + functions (gated above) ─
      - name: Write service account
        run: printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
      - name: Deploy to Firebase
        working-directory: ${{ github.workspace }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: >-
          npx --yes firebase-tools@13 deploy
          --only hosting,firestore:rules,storage,functions
          --project co-board
          --non-interactive
