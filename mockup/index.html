<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoBoard — לוח תקשורת</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Fitzgerald Key — desaturated / autism-friendly */
      --fitz-pronoun:   #FFF3C4; /* yellow soft  — אני / אתה */
      --fitz-verb:      #D1EDDA; /* green soft   — רוצה / הולך */
      --fitz-noun:      #FFE5CC; /* orange soft  — כדור / בית */
      --fitz-adj:       #D6E8FF; /* blue soft    — גדול / קטן */
      --fitz-negation:  #FFD6D6; /* red soft     — לא / כואב */
      --fitz-social:    #FADADD; /* pink soft    — שלום / תודה */
      --fitz-misc:      #E8E8F0; /* grey-purple  — שונות */

      --fitz-pronoun-border:  #E8C840;
      --fitz-verb-border:     #5DBB7B;
      --fitz-noun-border:     #F4965A;
      --fitz-adj-border:      #6AABF0;
      --fitz-negation-border: #F07070;
      --fitz-social-border:   #F0A0A8;

      --bg:         #F8FAFF;
      --surface:    #FFFFFF;
      --text-main:  #1E2A3A;
      --text-muted: #5A6A7A;
      --radius:     16px;
      --shadow:     0 2px 8px rgba(0,0,0,.08);
      --shadow-press: 0 1px 3px rgba(0,0,0,.12);

      --speak-btn:  #4CAF8C;
      --nav-bg:     #ECEEF8;
      --sentence-h: 80px;
      --nav-h:      72px;
    }

    html, body {
      height: 100%;
      background: #CBD5E8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rubik', 'Segoe UI', sans-serif;
    }

    /* ─── Device Frame ─── */
    .device {
      width: 390px;
      height: 780px;
      background: var(--bg);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25), 0 0 0 8px #2A3040;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ─── Status Bar ─── */
    .status-bar {
      height: 28px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
      border-bottom: 1px solid #EEF0F8;
    }
    .status-bar .time { font-family: 'Baloo 2', sans-serif; }

    /* ─── App Header ─── */
    .app-header {
      height: 40px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #EEF0F8;
    }
    .app-logo {
      font-family: 'Baloo 2', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #3A6EA5;
      letter-spacing: -0.3px;
    }
    .app-logo span { color: #5DBB7B; }
    .header-icons { display: flex; gap: 8px; }
    .header-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }
    .header-icon svg { width: 14px; height: 14px; }

    /* ─── Sentence Bar ─── */
    .sentence-bar {
      height: var(--sentence-h);
      background: var(--surface);
      border-bottom: 2px solid #E8ECF8;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      flex-shrink: 0;
    }
    .speak-btn {
      height: 54px;
      min-width: 68px;
      background: var(--speak-btn);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      box-shadow: 0 3px 0 #3A9B6E;
      transition: transform 100ms, box-shadow 100ms;
      flex-shrink: 0;
    }
    .speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3A9B6E; }
    .speak-btn svg { width: 18px; height: 18px; }

    .sentence-text {
      flex: 1;
      min-height: 54px;
      background: #F3F6FF;
      border: 2px solid #D8E0F4;
      border-radius: 14px;
      padding: 8px 12px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 16px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 150ms;
    }
    .sentence-text:hover { border-color: #A8B8E8; }
    .sentence-word {
      background: #FFFFFF;
      border: 1.5px solid #C8D4EE;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 15px;
      white-space: nowrap;
      animation: wordPop 150ms ease-out;
    }
    @keyframes wordPop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .sentence-placeholder {
      color: #B0BAD4;
      font-size: 14px;
      font-style: italic;
    }
    .sentence-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .mini-btn {
      height: 24px;
      padding: 0 10px;
      border: 1.5px solid #D8DFF0;
      border-radius: 8px;
      background: #F0F3FC;
      font-family: 'Rubik', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 120ms;
      white-space: nowrap;
    }
    .mini-btn:hover { background: #E4E8F8; }

    /* ─── Symbol Grid ─── */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      align-content: start;
    }

    /* ─── Symbol Button ─── */
    .sym-btn {
      aspect-ratio: 1;
      border-radius: var(--radius);
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: transform 100ms, box-shadow 100ms, filter 120ms;
      box-shadow: var(--shadow);
      padding: 6px 4px 8px;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .sym-btn:hover  { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(0,0,0,.13); }
    .sym-btn:active { transform: translateY(1px);  box-shadow: var(--shadow-press); filter: brightness(.96); }

    /* Fitzgerald category coloring */
    .cat-pronoun  { background: var(--fitz-pronoun);  border-color: var(--fitz-pronoun-border); }
    .cat-verb     { background: var(--fitz-verb);     border-color: var(--fitz-verb-border); }
    .cat-noun     { background: var(--fitz-noun);     border-color: var(--fitz-noun-border); }
    .cat-adj      { background: var(--fitz-adj);      border-color: var(--fitz-adj-border); }
    .cat-negation { background: var(--fitz-negation); border-color: var(--fitz-negation-border); }
    .cat-social   { background: var(--fitz-social);   border-color: var(--fitz-social-border); }
    .cat-misc     { background: var(--fitz-misc);     border-color: #C8C8D8; }

    .sym-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(255,255,255,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      line-height: 1;
    }
    .sym-label {
      font-family: 'Baloo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      text-align: center;
      line-height: 1.2;
      direction: rtl;
    }
    .sym-nikud {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1;
    }

    /* ─── Category Divider ─── */
    .grid-divider {
      grid-column: 1 / -1;
      height: 1px;
      background: #E0E4F0;
      margin: 2px 0;
    }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      height: var(--nav-h);
      background: var(--nav-bg);
      border-top: 2px solid #D8DCF0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .nav-btn {
      height: 52px;
      min-width: 80px;
      border: none;
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      font-family: 'Rubik', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: background 120ms, transform 80ms;
      padding: 0 12px;
    }
    .nav-btn:hover  { background: #EEF1FC; }
    .nav-btn:active { transform: scale(.96); }
    .nav-btn svg { width: 20px; height: 20px; color: #7080A0; }
    .nav-btn.nav-home svg { color: #3A6EA5; }
    .nav-btn.nav-home { color: #3A6EA5; font-weight: 600; }

    /* ─── Scrollbar ─── */
    .grid-area::-webkit-scrollbar { width: 4px; }
    .grid-area::-webkit-scrollbar-thumb { background: #C8D0E8; border-radius: 4px; }

    /* ─── Legend (outside device) ─── */
    .legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255,255,255,.95);
      border-radius: 16px;
      padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      font-family: 'Rubik', sans-serif;
      font-size: 12px;
      color: #2A3A4A;
      direction: rtl;
    }
    .legend h4 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1E2A3A;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .legend-swatch {
      width: 16px; height: 16px;
      border-radius: 5px;
      border: 1.5px solid rgba(0,0,0,.12);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Legend ── -->
<div class="legend">
  <h4>מפתח פיצג'רלד</h4>
  <div class="legend-item"><div class="legend-swatch" style="background:#FFF3C4;border-color:#E8C840"></div> כינויי גוף</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#D1EDDA;border-color:#5DBB7B"></div> פעלים</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#FFE5CC;border-color:#F4965A"></div> שמות עצם</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#D6E8FF;border-color:#6AABF0"></div> תארים</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#FFD6D6;border-color:#F07070"></div> שלילה / חירום</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#FADADD;border-color:#F0A0A8"></div> חברתי</div>
</div>

<!-- ── Device ── -->
<div class="device">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">10:42</span>
    <span>עומר 🔒</span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
    </span>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <div class="app-logo">Co<span>Board</span></div>
    <div class="header-icons">
      <!-- settings icon -->
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <!-- lock icon -->
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Sentence Bar -->
  <div class="sentence-bar">
    <button class="speak-btn" aria-label="דבר">
      <svg viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      דבר
    </button>

    <div class="sentence-text" role="log" aria-label="משפט נבנה">
      <span class="sentence-word">אֲנִי</span>
      <span class="sentence-word">רוֹצֶה</span>
      <span class="sentence-word">כַּדּוּר</span>
    </div>

    <div class="sentence-actions">
      <button class="mini-btn" aria-label="מחק מילה אחרונה">מחק</button>
      <button class="mini-btn" aria-label="נקה הכל">נקה</button>
    </div>
  </div>

  <!-- Symbol Grid -->
  <div class="grid-area" role="grid" aria-label="לוח סמלים">

    <!-- Row 1: Pronouns + core verbs -->
    <button class="sym-btn cat-pronoun" aria-label="אני">
      <div class="sym-icon">🧒</div>
      <div class="sym-label">אֲנִי</div>
    </button>
    <button class="sym-btn cat-pronoun" aria-label="אתה/את">
      <div class="sym-icon">👤</div>
      <div class="sym-label">אַתָּה</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="רוצה">
      <div class="sym-icon">💚</div>
      <div class="sym-label">רוֹצֶה</div>
    </button>
    <button class="sym-btn cat-negation" aria-label="לא">
      <div class="sym-icon">🛑</div>
      <div class="sym-label">לֹא</div>
    </button>

    <!-- Row 2: More verbs -->
    <button class="sym-btn cat-verb" aria-label="הולך">
      <div class="sym-icon">🚶</div>
      <div class="sym-label">הוֹלֵךְ</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="אוכל">
      <div class="sym-icon">🍽️</div>
      <div class="sym-label">אוֹכֵל</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="משחק">
      <div class="sym-icon">🎮</div>
      <div class="sym-label">מְשַׁחֵק</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="שותה">
      <div class="sym-icon">🥤</div>
      <div class="sym-label">שׁוֹתֶה</div>
    </button>

    <!-- Row 3: Nouns -->
    <button class="sym-btn cat-noun" aria-label="כדור">
      <div class="sym-icon">⚽</div>
      <div class="sym-label">כַּדּוּר</div>
    </button>
    <button class="sym-btn cat-noun" aria-label="אוכל">
      <div class="sym-icon">🍎</div>
      <div class="sym-label">אֹכֶל</div>
    </button>
    <button class="sym-btn cat-noun" aria-label="מים">
      <div class="sym-icon">💧</div>
      <div class="sym-label">מַיִם</div>
    </button>
    <button class="sym-btn cat-noun" aria-label="בית">
      <div class="sym-icon">🏠</div>
      <div class="sym-label">בַּיִת</div>
    </button>

    <!-- Row 4: Adjectives + Social -->
    <button class="sym-btn cat-adj" aria-label="גדול">
      <div class="sym-icon">⬆️</div>
      <div class="sym-label">גָּדוֹל</div>
    </button>
    <button class="sym-btn cat-adj" aria-label="קטן">
      <div class="sym-icon">⬇️</div>
      <div class="sym-label">קָטָן</div>
    </button>
    <button class="sym-btn cat-social" aria-label="שלום">
      <div class="sym-icon">👋</div>
      <div class="sym-label">שָׁלוֹם</div>
    </button>
    <button class="sym-btn cat-social" aria-label="תודה">
      <div class="sym-icon">🙏</div>
      <div class="sym-label">תּוֹדָה</div>
    </button>

    <!-- Divider + more rows (scrollable) -->
    <div class="grid-divider"></div>

    <button class="sym-btn cat-negation" aria-label="כואב לי">
      <div class="sym-icon">😢</div>
      <div class="sym-label">כּוֹאֵב</div>
    </button>
    <button class="sym-btn cat-negation" aria-label="עזרה">
      <div class="sym-icon">🆘</div>
      <div class="sym-label">עֶזְרָה</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="עצור">
      <div class="sym-icon">✋</div>
      <div class="sym-label">עֲצֹר</div>
    </button>
    <button class="sym-btn cat-verb" aria-label="עוד">
      <div class="sym-icon">➕</div>
      <div class="sym-label">עוֹד</div>
    </button>

    <button class="sym-btn cat-noun" aria-label="ספר">
      <div class="sym-icon">📚</div>
      <div class="sym-label">סֵפֶר</div>
    </button>
    <button class="sym-btn cat-noun" aria-label="אמא">
      <div class="sym-icon">👩</div>
      <div class="sym-label">אִמָּא</div>
    </button>
    <button class="sym-btn cat-noun" aria-label="אבא">
      <div class="sym-icon">👨</div>
      <div class="sym-label">אַבָּא</div>
    </button>
    <button class="sym-btn cat-misc" aria-label="עוד לוח">
      <div class="sym-icon" style="font-size:20px">📂</div>
      <div class="sym-label" style="font-size:11px">עוד...</div>
    </button>

  </div><!-- /grid-area -->

  <!-- Bottom Nav -->
  <div class="bottom-nav" role="navigation" aria-label="ניווט ראשי">
    <button class="nav-btn nav-home" aria-label="בית">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      בית
    </button>
    <button class="nav-btn" aria-label="חזור">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M9 14l-4-4 4-4"/><path d="M5 10h11a4 4 0 0 1 0 8h-1"/>
      </svg>
      חזור
    </button>
    <button class="nav-btn" aria-label="עוד קטגוריות">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/>
      </svg>
      עוד
    </button>
  </div>

</div><!-- /device -->

</body>
</html>
